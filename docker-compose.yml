services:
  dashboard:
    image: ghcr.io/chrisrico/catdash:latest
    container_name: catdash          # ts-ingress proxies to http://catdash:8080
    restart: unless-stopped
    # Run as the host user who owns your data folder (`id -u` / `id -g`).
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file: .env
    environment:
      DB_PATH: /data/catdash.db
      COLLECT_INTERVAL_HOURS: ${COLLECT_INTERVAL_HOURS:-6}
    networks:
      - ts-shared
    volumes:
      - ${DATA_DIR:-catdash_data}:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  # Same external network media-stack's ts-ingress joins. Created once with
  # `docker network create ts-shared`.
  ts-shared:
    external: true

volumes:
  catdash_data:
