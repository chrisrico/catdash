services:
  dashboard:
    image: ghcr.io/chrisrico/catdash:latest
    container_name: catdash
    restart: unless-stopped
    # Run as the host user who owns your data folder (values from `id -u` /
    # `id -g`), so the DB is written with ownership you already manage.
    # Unset, it falls back to the image's built-in non-root user (1000:1000).
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file: .env
    environment:
      DB_PATH: /data/catdash.db
      COLLECT_INTERVAL_HOURS: ${COLLECT_INTERVAL_HOURS:-6}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # Defaults to a Docker-managed named volume. Set DATA_DIR=/path/on/host in
      # .env to store the SQLite DB in a host folder instead (easy to back up).
      - ${DATA_DIR:-catdash_data}:/data
      # Follow the host's timezone (log timestamps). Read-only; override via TZ in .env.
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  # Used only when DATA_DIR is unset (the default). A host path in DATA_DIR
  # bypasses this and bind-mounts your folder directly.
  catdash_data: